<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Energy System</title>
<style>
:root{
  --green:#00a86b;--green2:#057a55;--blue:#2563eb;--red:#dc2626;--amber:#d97706;
  --bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d8deea;
  --soft:#eaf7f1;--shadow:0 10px 30px rgba(17,24,39,.08);--r:14px;
}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font:inherit}button{cursor:pointer}
.top{background:linear-gradient(135deg,#0f8f5f,#164e9f);color:white;padding:18px 16px 22px}
.topbar{max-width:1180px;margin:auto;display:flex;gap:12px;align-items:center;justify-content:space-between}
.brand h1{font-size:22px;margin:0 0 4px}.brand p{margin:0;font-size:13px;opacity:.88}
.lang{display:flex;gap:6px}.lang button{border:1px solid rgba(255,255,255,.45);background:transparent;color:white;border-radius:999px;padding:7px 11px;font-weight:700;font-size:12px}
.lang button.active{background:white;color:#116347}
.wrap{max-width:1180px;margin:-12px auto 34px;padding:0 14px}
.login{max-width:460px;margin:34px auto;background:white;border-radius:18px;padding:22px;box-shadow:var(--shadow)}
.login h2{margin:0 0 6px}.login p{margin:0 0 18px;color:var(--muted);font-size:14px}
.login-error{display:none;margin-top:12px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700}
.login-error.show{display:block}
label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 6px}
input,select{width:100%;border:2px solid var(--line);border-radius:12px;padding:13px;background:#fbfcff;outline:none}
input:focus,select:focus{border-color:var(--green);background:white}
.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:800;background:var(--green);color:white}
.btn.secondary{background:white;color:var(--text);border:2px solid var(--line)}
.btn.danger{background:var(--red)}.btn.blue{background:var(--blue)}
.hidden{display:none!important}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,1fr)}
.card{background:white;border:1px solid #edf0f6;border-radius:var(--r);box-shadow:0 2px 10px rgba(17,24,39,.04);padding:16px}
.stat .n{font-size:26px;font-weight:900;margin-bottom:3px}.stat .l{font-size:12px;color:var(--muted);font-weight:700}
.nav{display:flex;gap:8px;overflow:auto;padding:12px 0}.nav button{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 14px;font-weight:800;color:var(--muted)}
.nav button.active{background:var(--green);border-color:var(--green);color:white}
.section{display:none}.section.active{display:block}
.title{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:16px 0 10px}
.title h2{font-size:18px;margin:0}.title p{margin:3px 0 0;color:var(--muted);font-size:13px}
.two{grid-template-columns:1.35fr .9fr}.three{grid-template-columns:repeat(3,1fr)}
.bar{height:10px;background:#edf1f7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);border-radius:999px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:11px 9px;border-bottom:1px solid #edf0f6;text-align:left}th{color:var(--muted);font-size:11px;text-transform:uppercase}
.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;background:var(--soft);color:var(--green2)}
.badge.red{background:#fee2e2;color:#b91c1c}.badge.amber{background:#fef3c7;color:#92400e}.badge.blue{background:#dbeafe;color:#1d4ed8}
.canvas{width:100%;height:230px;border:1px solid #edf0f6;border-radius:12px;background:linear-gradient(#fff,#fbfcff)}
.tips{display:grid;gap:10px}.tip{border-left:4px solid var(--green);background:#f7fffb;border-radius:10px;padding:11px;font-size:13px;line-height:1.45}
.sharebox{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:center}.mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini .stat{background:#f8fbff;border:1px solid #e5edf7;border-radius:12px;padding:14px}.mini .stat strong{display:block;font-size:26px;margin-bottom:3px}.mini .stat span{font-size:12px;color:var(--muted);font-weight:700}.share-green{color:#00a86b}.share-blue{color:#2563eb}
.roomlist{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.room{border:2px solid var(--line);border-radius:12px;background:white;padding:12px 4px;text-align:center;font-weight:900}
.room.used{background:var(--soft);border-color:var(--green);color:var(--green2)}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.alert{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:12px;font-weight:700;font-size:13px}
.ok{background:#ecfdf5;border-color:#bbf7d0;color:#047857}.bad{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.userbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0;color:white}
.userbar button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:white;border-radius:10px;padding:9px 12px;font-weight:800}
@media(max-width:850px){.cards,.two,.three,.sharebox{grid-template-columns:1fr}.roomlist{grid-template-columns:repeat(4,1fr)}.formrow{grid-template-columns:1fr}.topbar{display:block}.lang{margin-top:12px}}
</style>
</head>
<body>
<header class="top">
  <div class="topbar">
    <div class="brand">
      <h1 data-sw="Smart Home Energy System" data-en="Smart Home Energy System">Smart Home Energy System</h1>
      <p data-sw="Sensa, LUKU, utabiri, bili na optimization kwa vyumba 16" data-en="Census, LUKU, prediction, billing and optimization for 16 rooms">Sensa, LUKU, utabiri, bili na optimization kwa vyumba 16</p>
    </div>
    <div class="lang"><button id="bSw" class="active" onclick="setLang('sw')">Kiswahili</button><button id="bEn" onclick="setLang('en')">English</button></div>
  </div>
  <div class="wrap userbar hidden" id="userbar">
    <div><strong id="who"></strong><div id="roleText" style="font-size:12px;opacity:.85"></div></div>
    <button onclick="logout()" data-sw="Toka" data-en="Logout">Toka</button>
  </div>
</header>

<main class="wrap">
  <section class="login" id="loginBox">
    <h2 data-sw="Ingia kwenye mfumo" data-en="Login to the system">Ingia kwenye mfumo</h2>
    <p data-sw="Mpangaji ingiza jina lako kwanza, kisha ingiza namba ya chumba." data-en="Tenant, enter your name first, then enter your room number.">Mpangaji ingiza jina lako kwanza, kisha ingiza namba ya chumba.</p>
    <label data-sw="Jina la mpangaji" data-en="Tenant name">Jina la mpangaji</label>
    <input id="loginName" placeholder="Mfano: Brayton">
    <label data-sw="Namba ya chumba" data-en="Room number">Namba ya chumba</label>
    <input id="loginRoom" placeholder="Mfano: C02 au 2">
    <button class="btn" style="width:100%;margin-top:16px" onclick="login()" data-sw="Ingia" data-en="Login">Ingia</button>
    <div id="loginError" class="login-error"></div>
  </section>

  <section id="app" class="hidden">
    <nav class="nav">
      <button class="active" onclick="tab('home',this)" data-sw="Muhtasari" data-en="Overview">Muhtasari</button>
      <button id="lukuTab" onclick="tab('luku',this)" data-sw="Ingiza LUKU" data-en="Enter LUKU">Ingiza LUKU</button>
      <button onclick="tab('rooms',this)" data-sw="Vyumba" data-en="Rooms">Vyumba</button>
      <button onclick="tab('compare',this)" data-sw="Ulinganisho" data-en="Compare">Ulinganisho</button>
      <button onclick="tab('tips',this)" data-sw="Ushauri" data-en="Tips">Ushauri</button>
      <button id="adminTab" onclick="tab('admin',this)" data-sw="Admin" data-en="Admin">Admin</button>
    </nav>

    <section class="section active" id="home">
      <div class="title"><div><h2 data-sw="Muhtasari wa matumizi" data-en="Energy overview">Muhtasari wa matumizi</h2><p id="homeSub"></p></div><button class="btn secondary" onclick="refreshData()" data-sw="Sasisha data" data-en="Refresh data">Sasisha data</button></div>
      <div class="grid cards">
        <div class="card stat"><div class="n" id="stKwh">0</div><div class="l">kWh/mwezi</div></div>
        <div class="card stat"><div class="n" id="stBill">TZS 0</div><div class="l" data-sw="Makadirio ya bili" data-en="Estimated bill">Makadirio ya bili</div></div>
        <div class="card stat"><div class="n" id="stRank">#0</div><div class="l" id="rankLabel" data-sw="Nafasi ya matumizi" data-en="Usage rank">Nafasi ya matumizi</div></div>
        <div class="card stat"><div class="n" id="stDays">0</div><div class="l" data-sw="Siku za data ya LUKU" data-en="LUKU data days">Siku za data ya LUKU</div></div>
