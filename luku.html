<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekodi ya LUKU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;color:#202124}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;padding:20px;text-align:center}
.header h1{font-size:1.3rem;font-weight:700}
.header p{font-size:0.85rem;opacity:0.85;margin-top:4px}
.stats{display:flex;gap:8px;padding:12px;background:white;border-bottom:1px solid #dadce0}
.stat{flex:1;background:#e8f0fe;border-radius:10px;padding:10px;text-align:center}
.stat .n{font-size:1.3rem;font-weight:700;color:#1a73e8}
.stat .l{font-size:0.65rem;color:#5f6368;margin-top:2px}
.card{background:white;border-radius:16px;margin:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card-title{font-size:1rem;font-weight:700;color:#1557b0;margin-bottom:14px}
label{display:block;font-size:0.8rem;font-weight:600;color:#5f6368;margin:12px 0 5px}
input,select,textarea{width:100%;padding:12px;border:2px solid #dadce0;border-radius:10px;font-size:1rem;background:#f8f9fa;outline:none}
input:focus,select:focus,textarea:focus{border-color:#1a73e8;background:white}
.wakati-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wbtn{padding:14px;border:2px solid #dadce0;border-radius:12px;text-align:center;cursor:pointer;background:#f8f9fa;transition:all 0.2s;user-select:none}
.wbtn.active{border-color:#1a73e8;background:#e8f0fe;color:#1557b0;font-weight:700}
.wbtn .icon{font-size:1.5rem;display:block;margin-bottom:4px}
.wbtn .txt{font-size:0.85rem;font-weight:600}
.wbtn .sub{font-size:0.7rem;color:#5f6368}
.hewa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hbtn{padding:10px 4px;border:2px solid #dadce0;border-radius:10px;text-align:center;cursor:pointer;background:#f8f9fa;font-size:0.75rem;transition:all 0.2s;user-select:none}
.hbtn .icon{font-size:1.4rem;display:block;margin-bottom:3px}
.hbtn.active{border-color:#1a73e8;background:#e8f0fe;font-weight:700}
.mbox{background:#e8f0fe;border-radius:12px;padding:14px;margin-top:10px;display:none}
.mbox.show{display:block}
.mrow{display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.85rem}
.mrow .lbl{color:#5f6368}
.mrow .val{font-weight:700;color:#1557b0}
.alert{display:none;padding:12px;border-radius:10px;margin-top:10px;font-size:0.85rem;font-weight:600}
.ay{background:#fff8e1;border:2px solid #fbbc04;color:#795000}
.ar{background:#fce8e6;border:2px solid #ea4335;color:#c5221f}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mitem{padding:10px;border:2px solid #dadce0;border-radius:10px;cursor:pointer;background:#f8f9fa;font-size:0.78rem;display:flex;align-items:center;gap:6px;transition:all 0.2s;user-select:none}
.mitem.checked{border-color:#1a73e8;background:#e8f0fe}
.usection{display:none;margin-top:10px}
.usection.show{display:block}
.btn-sub{width:100%;padding:16px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;border:none;border-radius:14px;font-size:1.05rem;font-weight:700;cursor:pointer;margin-top:8px}
.btn-sub:disabled{opacity:0.5}
.ritem{border:1px solid #dadce0;border-radius:10px;padding:12px;margin-bottom:8px;background:#f8f9fa;font-size:0.82rem}
.rtop{display:flex;justify-content:space-between;margin-bottom:4px}
.rdate{font-weight:700;color:#1557b0}
.empty{text-align:center;padding:24px;color:#5f6368;font-size:0.85rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#202124;color:white;padding:12px 24px;border-radius:24px;font-size:0.9rem;font-weight:600;transition:transform 0.3s;z-index:9999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Rekodi ya Mita ya LUKU</h1>
  <p>Smart Home Energy Project — Nyumba ya Vyumba 16</p>
</div>

<div class="stats">
  <div class="stat"><div class="n" id="sSalio">—</div><div class="l">Salio (Units)</div></div>
  <div class="stat"><div class="n" id="sRekodi">0</div><div class="l">Rekodi Zote</div></div>
  <div class="stat"><div class="n" id="sWastani">—</div><div class="l">Wastani/Siku</div></div>
  <div class="stat"><div class="n" id="sSiku">0/60</div><div class="l">Siku/Lengo</div></div>
</div>

<div class="card">
  <div class="card-title">🕐 Wakati wa Kusoma Mita</div>
  <div class="wakati-grid">
    <div class="wbtn active" id="bAsubuhi" onclick="setWakati('Asubuhi')">
      <span class="icon">🌅</span>
      <span class="txt">Asubuhi</span>
      <span class="sub">Saa 12 asubuhi</span>
    </div>
    <div class="wbtn" id="bJioni" onclick="setWakati('Jioni')">
      <span class="icon">🌆</span>
      <span class="txt">Jioni</span>
      <span class="sub">Saa 12 jioni</span>
    </div>
  </div>
  <label>📅 Tarehe</label>
  <input type="date" id="tarehe">
</div>

<div class="card">
  <div class="card-title">📟 Salio la Mita</div>
  <label>Salio Jipya (Units) —
